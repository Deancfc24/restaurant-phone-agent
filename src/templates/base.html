<!DOCTYPE html>
<html lang="he" dir="rtl" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mia Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900" dir="ltr">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center gap-3 text-xl font-bold text-indigo-600 hover:text-indigo-700">
          <span class="text-2xl">&#x1F4DE;</span>
          Mia Dashboard
        </a>
        <div class="flex items-center gap-4">
          <a href="/" class="text-sm font-medium text-gray-600 hover:text-gray-900">Restaurants</a>
          <a href="/restaurants/new"
             class="inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-indigo-700 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Add Restaurant
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% if flash_message %}
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4 fade-in">
    <div class="rounded-lg px-4 py-3 text-sm font-medium
      {% if flash_type == 'error' %}bg-red-50 text-red-800 border border-red-200
      {% elif flash_type == 'warning' %}bg-yellow-50 text-yellow-800 border border-yellow-200
      {% else %}bg-green-50 text-green-800 border border-green-200{% endif %}">
      {{ flash_message }}
    </div>
  </div>
  {% endif %}

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <p class="text-center text-xs text-gray-400">Mia Restaurant Phone Agent &mdash; Admin Dashboard</p>
    </div>
  </footer>

</body>
</html>
